name: Nightly

on:
  schedule:
    - cron: "0 3 * * *"

  workflow_dispatch:

permissions:
  contents: read
  packages: read
  security-events: write

concurrency:
  group: nightly
  cancel-in-progress: false

env:
  NODE_VERSION: 22

jobs:
  nightly:
    name: Nightly Verification

    runs-on: ubuntu-latest

    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: ./.github/actions/verify-project
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Scan API Image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: docker.io/library/api:latest
          severity: HIGH,CRITICAL
          exit-code: 0

      - name: Scan WEB Image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: docker.io/library/web:latest
          severity: HIGH,CRITICAL
          exit-code: 0

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: nightly-results
          path: |
            coverage
            reports