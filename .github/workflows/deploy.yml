name: Production Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pnpm install

      - name: Run Prisma Migrations
        # Это та самая «профессиональная» часть — обновление БД
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx prisma migrate deploy --schema=./apps/api/src/prisma/schema.prisma

      - name: Deploy to Server
        # Здесь обычно вызывается скрипт для обновления твоего VPS или облака
        run: echo "Деплой на сервер запущен..."