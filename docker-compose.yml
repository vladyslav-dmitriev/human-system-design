services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api

  api:
    build: .
    working_dir: /usr/src/app/apps/api
    volumes:
      - ./apps/api:/usr/src/app/apps/api
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://user:password@db:5432/mydb
      - PRISMA_CONFIG_PATH=/usr/src/app/apps/api/src/prisma/prisma.config.ts
    command: pnpm --filter api run start:dev

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/mydb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  web:
    build: .
    volumes:
      - ./apps/web:/usr/src/app/apps/web
    working_dir: /usr/src/app/apps/web
    environment:
      - NEXT_PUBLIC_API_URL=/api
      - NEXT_TELEMETRY_DISABLED=1
      - HOST=0.0.0.0
      - NEXT_PUBLIC_SITE_URL=http://myapp.local
    command: pnpm --filter web run dev

volumes:
  pgdata:
  redisdata: