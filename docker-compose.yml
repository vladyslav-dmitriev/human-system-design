services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api

  api:
    build: .
    volumes:
      - ./apps/api:/usr/src/app/apps/api
    env_file:
      - ./apps/api/.env
    environment:
      - NODE_ENV=development
    working_dir: /usr/src/app/apps/api
    command: pnpm run start:dev

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/mydb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb
    # ports:
    #   - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    labels:
      backup.enabled: "true"
      backup.cron: "0 2 * * *"      # Каждый день в 2 часа ночи
      backup.type: "postgres"
      backup.conn: "postgresql://user:password@postgres:5432/mydb"
      backup.dest: "remote"         # В S3 или MinIO
      backup.retention: "7d"        # Хранить 7 дней

  label-backup:   # ← Добавьте ЭТОТ сервис
    image: resulgg/label-backup
    environment:
      LOCAL_BACKUP_PATH: "/backups"
      GLOBAL_RETENTION_PERIOD: "30d"
      LOG_LEVEL: "info"
    volumes:
      - ./backups:/backups
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - db
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: root
    ports:
      - "5050:80"
    depends_on:
      - db

  redis:
    image: redis:7-alpine
    # ports:
    #   - "6379:6379"
    volumes:
      - redisdata:/data

  web:
    build: .
    volumes:
      - ./apps/web:/usr/src/app/apps/web
    env_file:
      - ./apps/web/.env
    working_dir: /usr/src/app/apps/web
    command: pnpm run dev

volumes:
  pgdata:
  redisdata: