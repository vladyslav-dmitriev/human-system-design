services:
  api:
    build: .
    ports:
      - "3001:3001"
    volumes:
      - ./apps/api:/usr/src/app/apps/api
      - /usr/src/app/apps/api/node_modules
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://user:password@db:5432/mydb
      - PRISMA_CONFIG_PATH=/usr/src/app/apps/api/src/prisma/prisma.config.ts
    command: npm run start:dev

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/mydb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata: