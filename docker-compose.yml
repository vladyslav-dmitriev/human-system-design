services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api

  api:
    build: .
    volumes:
      - ./apps/api:/usr/src/app/apps/api
    env_file:
      - ./apps/api/.env
    environment:
      - NODE_ENV=development
      - TS_NODE_TRANSPILE_ONLY=true
      - TS_NODE_IGNORE_WARNINGS=true
      # RabbitMQ connection
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER:-admin}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-admin123}
      - RABBITMQ_VHOST=${RABBITMQ_VHOST:-/}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-admin}:${RABBITMQ_PASSWORD:-admin123}@rabbitmq:5672${RABBITMQ_VHOST:-/}
      - RABBITMQ_PREFETCH=1
      - RABBITMQ_RECONNECT_INTERVAL=5000
    working_dir: /usr/src/app/apps/api
    command: pnpm run start:dev

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/mydb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb
    # ports:
    #   - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    labels:
      backup.enabled: "true"
      backup.cron: "0 2 * * *"      # Каждый день в 2 часа ночи
      backup.type: "postgres"
      backup.conn: "postgresql://user:password@postgres:5432/mydb"
      backup.dest: "remote"         # В S3 или MinIO
      backup.retention: "7d"        # Хранить 7 дней

  label-backup:   # ← Добавьте ЭТОТ сервис
    image: resulgg/label-backup
    environment:
      LOCAL_BACKUP_PATH: "/backups"
      GLOBAL_RETENTION_PERIOD: "30d"
      LOG_LEVEL: "info"
    volumes:
      - ./backups:/backups
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - db
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: root
    ports:
      - "5050:80"
    depends_on:
      - db

  redis:
    image: redis:7-alpine
    # ports:
    #   - "6379:6379"
    volumes:
      - redisdata:/data
  
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    hostname: rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"      # AMQP порт для приложения
      - "15672:15672"    # Management UI
      - "15692:15692"    # Prometheus metrics (опционально)
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-admin}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:-admin123}
      - RABBITMQ_DEFAULT_VHOST=${RABBITMQ_VHOST:-/}
      - RABBITMQ_ERLANG_COOKIE=${RABBITMQ_ERLANG_COOKIE:-secret_cookie}
      - RABBITMQ_NODENAME=rabbit@rabbitmq
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - rabbitmq_logs:/var/log/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build: .
    volumes:
      - ./apps/web:/usr/src/app/apps/web
      - ./apps/web:/app
    env_file:
      - ./apps/web/.env
    working_dir: /usr/src/app/apps/web
    command: pnpm run dev

volumes:
  pgdata:
  redisdata:
  rabbitmq_data:
  rabbitmq_logs: