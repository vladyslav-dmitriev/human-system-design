apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
spec:
  source:
    repoURL: https://github.com/vladyslav-dmitriev/human-system-design.git
    targetRevision: main
    path: infra/helm/vendors/grafana
    helm:
      valueFiles:
      - values.yaml
      parameters:
      - name: podSecurityPolicy.enabled
        value: "false"
      - name: rbac.pspEnabled
        value: "false"
      - name: global.podSecurityPolicy.enabled
        value: "false"
      - name: persistence.enabled
        value: "false"