apiVersion: argoproj.io/v1alpha1
kind: AppProject

metadata:
  name: human-system-design
  namespace: argocd

spec:
  description: My Fullstack Application

  sourceRepos:
    - "*"

  destinations:
    - namespace: "*"
      server: https://kubernetes.default.svc

  clusterResourceWhitelist:
    - group: "*"
      kind: "*"

  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"