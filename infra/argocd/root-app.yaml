apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: root
  namespace: argocd

spec:
  project: human-system-design

  source:
    repoURL: https://github.com/vladyslav-dmitriev/human-system-design.git
    targetRevision: main
    path: infra/argocd/applications

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true