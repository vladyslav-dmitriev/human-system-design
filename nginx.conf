gzip on;
gzip_vary on;
gzip_comp_level 6;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

server {
    listen 80;
    server_name myapp.local;

    # 1. Запросы NextAuth (Авторизация) -> строго на фронтенд (web)
    # Это решает проблему 404, так как запросы больше не уходят на api:3001
    location /api/auth/ {
        proxy_pass http://web:3000;
        proxy_set_header Host $http_host;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Важно для передачи кук
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
        
        # Добавьте эти заголовки
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    # 2. Остальные запросы к API -> на ваш бэкенд (api)
    # Используем слэш в конце, чтобы корректно передавать пути
    location /api/ {
        proxy_pass http://api:3001;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
    }

    # 3. Фронтенд (web) и WebSocket (HMR)
    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_pass_header Set-Cookie;
        
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ЭТО ВАЖНО: 
        # Отключите кэширование для всех запросов, проходящих через /
        proxy_no_cache 1;
        proxy_cache_bypass 1;    
    }

    location ~* ^/(_next/|static/|favicon.ico|assets/) {
        proxy_pass http://web:3000;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, no-transform";
    }

    # Кэширование статических файлов
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff2|svg)$ {
        expires 1d;           # Файлы будут кэшироваться браузером на 30 дней
        add_header Cache-Control "public, no-transform";
        access_log off;        # Отключаем логи для статики, чтобы не засорять файлы
    }
}