server {
    listen 80;
    server_name myapp.local;

    # Укажите путь, где лежат ваши статические файлы ВНУТРИ КОНТЕЙНЕРА NGINX
    # Если вы не копируете статику в Nginx, просто уберите строку root
    # root /app/public; 

    # 1. Запросы NextAuth
    location /api/auth/ {
        proxy_pass http://web:3000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. Остальные запросы к API
    location /api/ {
        proxy_pass http://api:3001/;
        proxy_set_header Host $http_host;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
    }

    # 3. Статика (картинки, шрифты)
    # Если файл есть на диске - отдаем его, если нет - идем в location /
    location ~* \.(jpg|jpeg|png|gif|ico|css|woff2|svg)$ {
        expires 1d;
        add_header Cache-Control "public, no-transform";
        try_files $uri @proxy_web; 
    }

    # 4. Основной блок
    location / {
        try_files $uri @proxy_web;
    }

    # Именованный локейшн для проксирования
    location @proxy_web {
        proxy_pass http://web:3000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
    }
}